name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Deps
        run: npm ci
      - name: Run ESLint
        run: npx eslint .

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: COP4331
          MYSQL_USER: TheBeast
          MYSQL_PASSWORD: WeLoveCOP4331
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and start PHP API with MySQL
        run: |
          docker-compose up -d --build
          until curl -s http://localhost:8080/Login.php > /dev/null; do echo "Waiting for PHP API..."; sleep 5; done
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Deps
        run: npm ci
      - name: Run Jest Integration Tests
        env:
          API_URL: http://localhost:8080
        run: npx jest src/integ.api.test.js
      - name: Teardown Docker
        if: always()
        run: docker-compose down -v

