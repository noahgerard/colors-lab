version: '3.8'
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: COP4331
      MYSQL_USER: TheBeast
      MYSQL_PASSWORD: WeLoveCOP4331
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql
      - ./src/LAMPAPI/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
  php:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=TheBeast
      - DB_PASSWORD=WeLoveCOP4331
      - DB_NAME=COP4331
volumes:
  db_data:
